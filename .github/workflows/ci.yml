name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-spec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify spec files exist
        run: |
          echo "Checking required spec documents..."
          for doc in ROAR-SPEC ROAR-IDENTITY ROAR-DISCOVERY ROAR-CONNECT ROAR-EXCHANGE ROAR-STREAM; do
            if [ ! -f "spec/$doc.md" ]; then
              echo "MISSING: spec/$doc.md"
              exit 1
            fi
            echo "  Found spec/$doc.md"
          done
          echo "All spec documents present."

      - name: Verify VERSION.json
        run: |
          python3 -c "
import json
v = json.load(open('spec/VERSION.json'))
assert 'spec_version' in v, 'Missing spec_version field'
assert 'layers' in v, 'Missing layers field'
print('Spec version:', v['spec_version'])
print('Layers:', list(v['layers'].keys()))
"

      - name: Check for broken internal links
        run: |
          echo "Checking for broken cross-references..."
          for file in spec/*.md; do
            grep -oP '\[.*?\]\((ROAR-\w+\.md)\)' "$file" 2>/dev/null | while read -r match; do
              target=$(echo "$match" | grep -oP 'ROAR-\w+\.md')
              if [ ! -f "spec/$target" ]; then
                echo "  BROKEN LINK: $target referenced in $file"
                exit 1
              fi
            done
          done
          echo "All internal links valid."

  conformance:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install roar-sdk from this repo
        run: pip install -e ./python

      - name: Run conformance tests
        run: python3 tests/validate_golden.py

      - name: Verify signature fixture is stable
        run: python3 tests/check_signature.py

      - name: Verify SDK version matches spec version
        run: python3 tests/check_versions.py
