name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typescript:
    name: TypeScript SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ts/package-lock.json
      - run: npm ci
        working-directory: ts
      - run: npx tsc --noEmit
        working-directory: ts
      - run: node tests/validate_golden.mjs
        working-directory: .

  python:
    name: Python SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -e ".[dev]"
        working-directory: python
      - run: pytest tests/conformance/ -v
        working-directory: python
