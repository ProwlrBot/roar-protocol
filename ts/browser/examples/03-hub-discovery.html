<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROAR — Hub Discovery</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'SF Mono', 'Fira Code', monospace; background: #0d1117; color: #c9d1d9; padding: 2rem; }
    h1 { color: #58a6ff; margin-bottom: 0.5rem; font-size: 1.4rem; }
    p.sub { color: #8b949e; margin-bottom: 1.5rem; font-size: 0.9rem; }
    .controls { margin-bottom: 1rem; display: flex; gap: 0.5rem; align-items: center; }
    input { background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; padding: 0.5rem; border-radius: 6px; font-family: inherit; width: 300px; }
    button { background: #238636; color: #fff; border: none; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-family: inherit; }
    button:hover { background: #2ea043; }
    button.secondary { background: #30363d; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; }
    .agent-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; }
    .agent-card h3 { color: #58a6ff; font-size: 0.95rem; margin-bottom: 0.25rem; }
    .agent-card .did { color: #8b949e; font-size: 0.7rem; word-break: break-all; }
    .agent-card .caps { margin-top: 0.5rem; }
    .cap { display: inline-block; background: #1f2937; border: 1px solid #30363d; padding: 2px 8px; border-radius: 12px; font-size: 0.7rem; margin: 2px; color: #7ee787; }
    .stats { color: #8b949e; font-size: 0.8rem; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <h1>ROAR Protocol — Hub Discovery</h1>
  <p class="sub">In-browser agent directory: register agents, search by capability, browse the network.</p>

  <div class="controls">
    <input id="search-input" placeholder="Search by capability (e.g. 'code')..." />
    <button id="search-btn">Search</button>
    <button id="populate-btn" class="secondary">Populate Demo Agents</button>
  </div>
  <div class="stats" id="stats">0 agents registered</div>
  <div class="grid" id="grid"></div>

  <script type="module">
    const directory = new Map();

    function uid(n) { return Array.from(crypto.getRandomValues(new Uint8Array(n))).map(b=>b.toString(16).padStart(2,'0')).join(''); }

    function registerAgent(name, type, capabilities, description) {
      const did = `did:roar:${type}:${name.toLowerCase().replace(/\s+/g,'-')}-${uid(8)}`;
      const card = { identity: { did, display_name: name, agent_type: type, capabilities, version: '1.0', public_key: null }, description, skills: capabilities, endpoints: { http: `https://agents.example.com/${did}` } };
      directory.set(did, card);
      return card;
    }

    function search(capability) {
      const q = capability.toLowerCase();
      return [...directory.values()].filter(c => c.identity.capabilities.some(cap => cap.toLowerCase().includes(q)) || c.identity.display_name.toLowerCase().includes(q));
    }

    function render(agents) {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      agents.forEach(a => {
        const div = document.createElement('div');
        div.className = 'agent-card';
        div.innerHTML = `
          <h3>${a.identity.display_name}</h3>
          <div class="did">${a.identity.did}</div>
          <p style="color:#8b949e;font-size:0.8rem;margin-top:0.25rem">${a.description}</p>
          <div class="caps">${a.identity.capabilities.map(c=>`<span class="cap">${c}</span>`).join('')}</div>
        `;
        grid.appendChild(div);
      });
      document.getElementById('stats').textContent = `${directory.size} agents registered, ${agents.length} shown`;
    }

    const demoAgents = [
      ['CodeBot', 'agent', ['code-review', 'refactoring', 'testing'], 'AI code review and refactoring agent'],
      ['DataPipe', 'tool', ['data-transform', 'etl', 'csv-parse'], 'Data pipeline processing tool'],
      ['SecurityScan', 'agent', ['vulnerability-scan', 'pen-test', 'audit'], 'Automated security analysis agent'],
      ['DocWriter', 'agent', ['documentation', 'markdown', 'api-docs'], 'Technical documentation generator'],
      ['Orchestrator', 'agent', ['workflow', 'delegation', 'scheduling'], 'Multi-agent workflow orchestrator'],
      ['ChatAgent', 'agent', ['conversation', 'qa', 'summarization'], 'Conversational AI assistant'],
      ['DeployBot', 'tool', ['ci-cd', 'docker', 'kubernetes'], 'Deployment automation tool'],
      ['MonitorAgent', 'agent', ['monitoring', 'alerting', 'metrics'], 'Infrastructure monitoring agent'],
      ['TranslateBot', 'agent', ['translation', 'localization', 'nlp'], 'Multi-language translation agent'],
      ['AnalyticsEngine', 'tool', ['analytics', 'visualization', 'reporting'], 'Data analytics and reporting engine'],
    ];

    document.getElementById('populate-btn').addEventListener('click', () => {
      demoAgents.forEach(([n,t,c,d]) => registerAgent(n,t,c,d));
      render([...directory.values()]);
    });

    document.getElementById('search-btn').addEventListener('click', () => {
      const q = document.getElementById('search-input').value.trim();
      render(q ? search(q) : [...directory.values()]);
    });

    document.getElementById('search-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('search-btn').click();
    });
  </script>
</body>
</html>
