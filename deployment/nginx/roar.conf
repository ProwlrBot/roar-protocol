# ROAR Protocol — nginx reverse proxy with TLS termination
# Usage: Replace YOUR_DOMAIN with your actual domain name.
# Certs: certbot --nginx -d YOUR_DOMAIN

# Rate limiting zones (http context)
limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=hub:10m rate=30r/m;

upstream roar_app {
    server app:8000;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name YOUR_DOMAIN;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;

    # TLS configuration
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Message endpoints (1 MiB body limit)
    location /roar/message {
        client_max_body_size 1m;
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://roar_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /message {
        client_max_body_size 1m;
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://roar_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Hub endpoints (256k body limit)
    location /roar/agents {
        client_max_body_size 256k;
        limit_req zone=hub burst=10 nodelay;

        proxy_pass http://roar_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /roar/federation {
        client_max_body_size 256k;
        limit_req zone=hub burst=10 nodelay;

        proxy_pass http://roar_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health & metrics (no rate limit)
    location /roar/health {
        proxy_pass http://roar_app;
        proxy_set_header Host $host;
        proxy_read_timeout 5s;
    }

    location /metrics {
        proxy_pass http://roar_app;
        proxy_set_header Host $host;
        proxy_read_timeout 5s;
        # Restrict to internal/monitoring networks
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
    }

    # SSE events — long-lived connections
    location /events {
        proxy_pass http://roar_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
    }

    # Rate limit error response
    error_page 429 = @rate_limited;
    location @rate_limited {
        default_type application/json;
        return 429 '{"error":"rate_limited","message":"Too many requests. Please retry later."}';
    }
}
