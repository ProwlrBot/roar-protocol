# ROAR Protocol — Production Stack
# Usage: docker compose -f deployment/docker-compose.prod.yml up -d

services:
  app:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile.prod
    restart: unless-stopped
    environment:
      - ROAR_REDIS_URL=redis://redis:6379/0
      - ROAR_ENV=production
      - ROAR_LOG_LEVEL=INFO
      - ROAR_ALLOWED_ORIGINS=${ROAR_ALLOWED_ORIGINS:-}
      - ROAR_RATE_LIMIT_PER_MINUTE=${ROAR_RATE_LIMIT_PER_MINUTE:-100}
      - ROAR_RATE_LIMIT_PER_HOUR=${ROAR_RATE_LIMIT_PER_HOUR:-1000}
      - GUNICORN_WORKERS=${GUNICORN_WORKERS:-3}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - roar-internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - roar-internal

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/roar.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
    networks:
      - roar-internal

volumes:
  redis-data:

networks:
  roar-internal:
    driver: bridge
