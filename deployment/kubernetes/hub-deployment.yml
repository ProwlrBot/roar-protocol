apiVersion: apps/v1
kind: Deployment
metadata:
  name: roar-hub
  namespace: roar-protocol
  labels:
    app.kubernetes.io/name: roar-hub
    app.kubernetes.io/part-of: roar-protocol
    app.kubernetes.io/component: hub
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: roar-hub
  template:
    metadata:
      labels:
        app.kubernetes.io/name: roar-hub
        app.kubernetes.io/part-of: roar-protocol
        app.kubernetes.io/component: hub
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: hub
          image: roar-hub:latest
          ports:
            - containerPort: 8090
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: roar-config
          env:
            - name: ROAR_MODE
              value: "hub"
            - name: ROAR_HOST
              value: "0.0.0.0"
            - name: ROAR_PORT
              value: "8090"
            - name: ROAR_SECRET
              valueFrom:
                secretKeyRef:
                  name: roar-secrets
                  key: hmac-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /roar/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /roar/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
---
apiVersion: v1
kind: Service
metadata:
  name: roar-hub
  namespace: roar-protocol
  labels:
    app.kubernetes.io/name: roar-hub
    app.kubernetes.io/part-of: roar-protocol
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: roar-hub
  ports:
    - port: 8090
      targetPort: http
      protocol: TCP
      name: http
