apiVersion: apps/v1
kind: Deployment
metadata:
  name: roar-agent
  namespace: roar-protocol
  labels:
    app.kubernetes.io/name: roar-agent
    app.kubernetes.io/part-of: roar-protocol
    app.kubernetes.io/component: agent
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: roar-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: roar-agent
        app.kubernetes.io/part-of: roar-protocol
        app.kubernetes.io/component: agent
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: agent
          image: roar-agent:latest
          ports:
            - containerPort: 8089
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: roar-config
          env:
            - name: ROAR_MODE
              value: "agent"
            - name: ROAR_HOST
              value: "0.0.0.0"
            - name: ROAR_PORT
              value: "8089"
            - name: ROAR_AGENT_NAME
              value: "roar-agent"
            - name: ROAR_AGENT_CAPS
              value: ""
            - name: ROAR_SECRET
              valueFrom:
                secretKeyRef:
                  name: roar-secrets
                  key: hmac-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /roar/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /roar/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
---
apiVersion: v1
kind: Service
metadata:
  name: roar-agent
  namespace: roar-protocol
  labels:
    app.kubernetes.io/name: roar-agent
    app.kubernetes.io/part-of: roar-protocol
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: roar-agent
  ports:
    - port: 8089
      targetPort: http
      protocol: TCP
      name: http
