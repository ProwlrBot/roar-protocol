# ROAR Protocol — Prometheus scrape configuration
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerting.yml"

scrape_configs:
  - job_name: "roar-protocol"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["app:8000"]
        labels:
          service: "roar-protocol"
          environment: "production"

  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          service: "redis"

  - job_name: "otel-collector"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["otel-collector:8889"]
        labels:
          service: "otel-collector"
